[phases.setup]
nixPkgs = ["python311Full", "nodejs_18", "pnpm"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "pnpm i --frozen-lockfile",
    "python3 -m venv /app/.venv",
    "/app/.venv/bin/pip install -r apps/api/requirements.txt"
]

[phases.build]
dependsOn = ["install"]
cmds = ["/app/.venv/bin/python -m playwright install chromium --with-deps"]

[start]
cmd = "cd apps/api && /app/.venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
