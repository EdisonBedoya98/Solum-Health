[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_18", "pnpm"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "pnpm i --frozen-lockfile",
    "pip --version || pip3 --version",
    "pip install -r apps/api/requirements.txt || pip3 install -r apps/api/requirements.txt"
]

[phases.build]
dependsOn = ["install"]
cmds = ["python3 -m playwright install chromium --with-deps"]

[start]
cmd = "cd apps/api && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
